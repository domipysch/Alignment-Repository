mapping:
  deterministic: true
graph:
  type: knn
  k:
    - 4
model:
  d:
    - 16
  enc_hidden_dim:
    - 64
  dec_hidden_dim:
    - 256
  K:
    - 20
training:
  lr:
    - 0.008
  epochs:
    - 1000
  dropout_decoder:
    - 0.0
  normalize_and_log:
    - false
  use_cm:
    - true
loss_weights:
  - lambda_rec_spot: 1.0
    lambda_rec_gene: 1.0
    lambda_rec_state: 0
    lambda_clust: 0
    lambda_state_entropy: 0.20
    lambda_spot_entropy: 0.15

