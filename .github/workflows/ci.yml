name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev tools
        run: pip install black mypy types-PyYAML

      - name: Check formatting (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy src/alternative_idea src/metrics src/data_preparation src/utils
