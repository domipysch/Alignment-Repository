name: dot_env
channels:
  - conda-forge
  - defaults

# After creating the environment, install DOTr from GitHub:
#   Rscript -e "devtools::install_github('saezlab/DOT')"

dependencies:
  - python=3.13
  - numpy
  - pandas
  - anndata
  - matplotlib
  - scikit-learn
  - networkx
  - r-base=4.5
  - r-matrix
  - r-devtools
  - r-hdf5r