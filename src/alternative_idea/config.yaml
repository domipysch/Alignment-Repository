mapping:
  deterministic: false
graph:
  type: knn
  k: 4
model:
  d: 32
  enc_hidden_dim: 64
  dec_hidden_dim: 256
  K: 20
training:
  lr: 0.001
  epochs: 1
  dropout_decoder: 0.0
  normalize_and_log: false
  use_cm: false
loss_weights:
  lambda_rec_spot: 1.0
  lambda_rec_gene: 1.0
  lambda_rec_state: 1.0
  lambda_clust: 1.0
  lambda_state_entropy: 1.0
  lambda_spot_entropy: 1.0
