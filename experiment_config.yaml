mapping:
  deterministic:
    - false
graph:
  type: knn
  k:
    - 4
model:
  d:
    - 16
  enc_hidden_dim:
    - 64
  dec_hidden_dim:
    - 256
  K:
    - 5
training:
  lr:
#    - 0.001
    - 0.005
#    - 0.008
#    - 0.010
  epochs:
    - 1000
  dropout_decoder:
    - 0.0
  normalize_and_log:
    - false
loss_weights:
  - lambda_rec_spot: 1.0
    lambda_rec_state: 1.0
    lambda_clust: 1.0
    lambda_state_entropy: 0.0
    lambda_spot_entropy: 0.0
